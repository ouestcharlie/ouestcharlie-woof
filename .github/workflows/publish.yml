name: Publish ouestcharlie-woof

on:
  workflow_dispatch:
    inputs:
      run-id:
        description: 'Build workflow run ID whose artifacts to publish'
        required: true
      target:
        description: 'Publish target'
        required: true
        default: 'test-pypi'
        type: choice
        options:
          - test-pypi
          - pypi

jobs:
  publish:
    name: Publish to ${{ inputs.target }}
    runs-on: ubuntu-22.04
    environment: ${{ inputs.target }}
    permissions:
      id-token: write  # trusted publishing
      actions: read    # needed to download artifacts from another run
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
          run-id: ${{ inputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ vars.PUBLISH_URL }}
          verbose: true
