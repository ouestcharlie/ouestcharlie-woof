name: Build (reusable)

on:
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: ouestcharlie/ouestcharlie-py-toolkit
          path: deps/ouestcharlie-py-toolkit

      - uses: actions/checkout@v6
        with:
          repository: ouestcharlie/ouestcharlie-whitebeard
          path: deps/ouestcharlie-whitebeard

      - uses: actions/checkout@v6
        with:
          repository: ouestcharlie/ouestcharlie-wally
          path: deps/ouestcharlie-wally

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build gallery
        working-directory: gallery
        run: npm ci && npm test && npm run build

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install hatch
        run: pip install hatch

      - name: Install toolkit (editable)
        run: pip install -e deps/ouestcharlie-py-toolkit

      - name: Install whitebeard (editable)
        run: pip install -e deps/ouestcharlie-whitebeard

      - name: Install wally (editable)
        run: pip install -e deps/ouestcharlie-wally

      - name: Build
        run: hatch build

      - name: Install package
        working-directory: dist
        shell: bash
        run: pip install ouestcharlie_woof-*.whl pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -v

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
