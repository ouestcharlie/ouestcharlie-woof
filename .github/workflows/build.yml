name: Build ouestcharlie-woof

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build.yml

  integration-test:
    name: Integration tests on ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
          - os: macos-latest
          - os: ubuntu-22.04
          - os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install packages
        working-directory: dist
        shell: bash
        run: pip install ouestcharlie_woof-*.whl pytest pytest-asyncio httpx

      - name: Run integration tests
        run: python -m pytest tests_integration/ -v
