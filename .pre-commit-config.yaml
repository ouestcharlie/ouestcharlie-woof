repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: eslint
        name: ESLint (gallery)
        entry: bash -c 'cd gallery && npm run lint'
        language: system
        files: ^gallery/src/.*\.(js|svelte)$
        pass_filenames: false
